services:
  # 1. Express Mock API Backend Service
  - type: web
    name: creator-directory-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

  # 2. Next.js Frontend Service
  - type: web
    name: creator-directory-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: creator-directory-api
          envVarKey: RENDER_EXTERNAL_URL
